<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolkata Metro Route Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: #1e1b4b;
            background-image: radial-gradient(circle, rgba(49, 46, 129, 0.7) 0%, #111827 70%);
        }
        svg text::selection { fill: #fff; background-color: #9333ea; }
        .station-label { font-size: 14px; font-weight: 500; }
        .glass-card {
            background-color: rgba(30, 27, 75, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(124, 58, 237, 0.3);
            box-shadow: 0 8px 32px 0 rgba(76, 29, 149, 0.37);
        }
        #realMap { width: 100%; height: 600px; border-radius: 0.5rem; background: #1e1b4b; }
        .view-toggle-btn { transition: all 0.2s ease; }
        .view-toggle-btn.active { background: linear-gradient(to right, #9333ea, #db2777); color: white; }
        .view-toggle-btn:not(.active) { background: rgba(30, 27, 75, 0.6); color: #a5b4fc; }
        .metro-user-marker {
            background: #22d3ee; border: 2px solid white; border-radius: 50%;
            width: 14px; height: 14px; box-shadow: 0 0 8px 2px rgba(34, 211, 238, 0.8);
        }
        .leaflet-popup-content-wrapper { background: #1e1b4b; color: #e5e7eb; border-radius: 8px; }
        .leaflet-popup-tip { background: #1e1b4b; }

        /* ---------- Intro / loading screen ---------- */
        #intro-screen {
            background: radial-gradient(ellipse at 50% 30%, #2a2470 0%, #14123a 55%, #0a0918 100%);
            overflow: hidden;
        }
        .intro-stars {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 40% 80%, rgba(255,255,255,0.35) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 55% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 10% 65%, rgba(255,255,255,0.3) 0%, transparent 100%);
            background-repeat: repeat;
            background-size: 300px 300px;
            opacity: 0.6;
            animation: twinkle 3s ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }
        .intro-track-wrap {
            position: relative;
            width: min(92vw, 640px);
            height: 130px;
        }
        .intro-rail {
            position: absolute;
            left: 0; right: 0; bottom: 22px;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, rgba(168,85,247,0.15), rgba(168,85,247,0.55), rgba(236,72,153,0.55), rgba(168,85,247,0.15));
            box-shadow: 0 0 12px rgba(168,85,247,0.4);
        }
        .intro-rail::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.35) 0 6px, transparent 6px 16px);
            border-radius: 3px;
        }
        .intro-sleeper-row {
            position: absolute;
            left: 0; right: 0; bottom: 14px;
            height: 4px;
            display: flex;
            justify-content: space-between;
        }
        .intro-sleeper {
            width: 3px;
            height: 10px;
            background: rgba(165,180,252,0.25);
            border-radius: 1px;
        }
        .intro-station-dot {
            position: absolute;
            bottom: 16px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid rgba(15,12,40,0.9);
            box-shadow: 0 0 10px currentColor;
            opacity: 0.35;
            transform: translateX(-50%);
            transition: opacity 0.25s ease;
        }
        .intro-station-dot.lit { opacity: 1; }
        .intro-train {
            position: absolute;
            bottom: 20px;
            left: -18%;
            width: 15%;
            min-width: 90px;
            animation: intro-move 2.6s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
            filter: drop-shadow(0 4px 10px rgba(219, 39, 119, 0.45));
        }
        @keyframes intro-move {
            0%   { left: -18%; }
            92%  { left: 103%; }
            100% { left: 103%; }
        }
        .intro-headlight-glow {
            animation: headlight-pulse 1s ease-in-out infinite alternate;
        }
        @keyframes headlight-pulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .intro-smoke {
            animation: smoke-rise 2.6s ease-out infinite;
            transform-origin: center;
        }
        @keyframes smoke-rise {
            0%   { opacity: 0; transform: translateY(0) scale(0.4); }
            15%  { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(-22px) scale(1.4); }
        }
        .intro-title-anim {
            animation: intro-title-in 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
            animation-delay: 0.15s;
        }
        .intro-subtitle-anim {
            animation: intro-title-in 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
            animation-delay: 0.4s;
        }
        @keyframes intro-title-in {
            0%   { opacity: 0; transform: translateY(14px); letter-spacing: 0.15em; }
            100% { opacity: 1; transform: translateY(0); letter-spacing: normal; }
        }
        .intro-progress-track {
            width: min(70vw, 280px);
            height: 4px;
            border-radius: 2px;
            background: rgba(165, 180, 252, 0.15);
            overflow: hidden;
        }
        .intro-progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            background: linear-gradient(90deg, #3b82f6, #22c55e, #f97316, #a855f7, #eab308);
            animation: intro-progress 2.4s ease-in-out forwards;
            animation-delay: 0.2s;
        }
        @keyframes intro-progress {
            0%   { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body class="text-gray-200">
    <!-- Intro Screen -->
    <div id="intro-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-indigo-950 transition-opacity duration-1000 ease-in-out">
        <div class="intro-stars"></div>

        <div class="relative z-10 flex flex-col items-center">
            <h2 class="intro-title-anim text-3xl md:text-4xl font-bold text-white tracking-tight text-center px-4">Kolkata Metro Guide</h2>
            <p class="intro-subtitle-anim text-purple-300 mt-2 text-sm md:text-base text-center px-4">Charting your next journey across the city...</p>
        </div>

        <div class="intro-track-wrap mt-8 relative z-10">
            <!-- Station dots along the line, colored per metro line -->
            <div class="intro-station-dot lit" style="left:6%; color:#3b82f6; background:#3b82f6; animation: dot-pulse 2.6s ease-in-out infinite; animation-delay:0s;"></div>
            <div class="intro-station-dot lit" style="left:27%; color:#22c55e; background:#22c55e; animation: dot-pulse 2.6s ease-in-out infinite; animation-delay:0.4s;"></div>
            <div class="intro-station-dot lit" style="left:50%; color:#f97316; background:#f97316; animation: dot-pulse 2.6s ease-in-out infinite; animation-delay:0.8s;"></div>
            <div class="intro-station-dot lit" style="left:73%; color:#a855f7; background:#a855f7; animation: dot-pulse 2.6s ease-in-out infinite; animation-delay:1.2s;"></div>
            <div class="intro-station-dot lit" style="left:94%; color:#eab308; background:#eab308; animation: dot-pulse 2.6s ease-in-out infinite; animation-delay:1.6s;"></div>

            <div class="intro-sleeper-row">
                <div class="intro-sleeper" style="margin-left:2%"></div>
                <div class="intro-sleeper"></div>
                <div class="intro-sleeper"></div>
                <div class="intro-sleeper"></div>
                <div class="intro-sleeper"></div>
                <div class="intro-sleeper"></div>
                <div class="intro-sleeper"></div>
                <div class="intro-sleeper"></div>
                <div class="intro-sleeper"></div>
                <div class="intro-sleeper" style="margin-right:2%"></div>
            </div>
            <div class="intro-rail"></div>

            <!-- Animated train -->
            <svg class="intro-train" viewBox="0 0 200 90" xmlns="http://www.w3.org/2000/svg">
                <ellipse class="intro-smoke" cx="34" cy="18" rx="7" ry="6" fill="#c7d2fe" />
                <ellipse class="intro-smoke" cx="30" cy="14" rx="5" ry="4" fill="#e0e7ff" style="animation-delay:0.6s" />
                <rect x="8" y="30" width="184" height="42" rx="12" fill="url(#introTrainBody)" />
                <rect x="8" y="30" width="184" height="10" rx="5" fill="#ffffff" fill-opacity="0.18" />
                <rect x="24" y="40" width="26" height="18" rx="3" fill="#0e0b2e" fill-opacity="0.85" />
                <rect x="58" y="40" width="26" height="18" rx="3" fill="#0e0b2e" fill-opacity="0.85" />
                <rect x="92" y="40" width="26" height="18" rx="3" fill="#0e0b2e" fill-opacity="0.85" />
                <rect x="126" y="40" width="26" height="18" rx="3" fill="#0e0b2e" fill-opacity="0.85" />
                <circle class="intro-headlight-glow" cx="184" cy="51" r="7" fill="#fef08a" />
                <circle cx="184" cy="51" r="3.5" fill="#fffbeb" />
                <rect x="0" y="26" width="14" height="12" rx="4" fill="#a855f7" />
                <circle cx="40" cy="76" r="9" fill="#1e1b4b" stroke="#a5b4fc" stroke-width="2" />
                <circle cx="40" cy="76" r="3" fill="#a5b4fc" />
                <circle cx="96" cy="76" r="9" fill="#1e1b4b" stroke="#a5b4fc" stroke-width="2" />
                <circle cx="96" cy="76" r="3" fill="#a5b4fc" />
                <circle cx="152" cy="76" r="9" fill="#1e1b4b" stroke="#a5b4fc" stroke-width="2" />
                <circle cx="152" cy="76" r="3" fill="#a5b4fc" />
                <defs>
                    <linearGradient id="introTrainBody" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#9333ea" />
                        <stop offset="55%" stop-color="#c026d3" />
                        <stop offset="100%" stop-color="#db2777" />
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <div class="intro-progress-track mt-8 relative z-10">
            <div class="intro-progress-fill"></div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="container mx-auto p-4 md:p-6 min-h-screen flex flex-col items-center">
            <!-- Header -->
            <header class="w-full max-w-5xl text-center mb-6 md:mb-8">
                <div class="flex items-center justify-center gap-3">
                    <h1 class="text-3xl md:text-4xl font-bold text-white tracking-tight">Kolkata Metro Guide</h1>
                </div>
            </header>
    
            <!-- Planner Card -->
            <div class="glass-card rounded-xl p-6 w-full max-w-5xl mb-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4 items-center">
                    <!-- Start Station -->
                    <div class="relative">
                        <div class="flex items-center gap-4 bg-indigo-950/60 p-3 rounded-lg border border-purple-800/50">
                            <div class="bg-purple-500/20 text-purple-400 p-2 rounded-full">
                                 <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                            </div>
                            <div class="w-full">
                                <label for="startStation" class="block text-xs font-medium text-gray-400">STARTING FROM</label>
                                <input type="text" id="startStation" placeholder="Search station or landmark..." class="w-full bg-transparent text-white text-lg font-medium focus:outline-none" autocomplete="off">
                            </div>
                        </div>
                        <div id="startLandmarkNote" class="hidden text-xs text-cyan-400 mt-1 pl-1"></div>
                        <div id="startSuggestions" class="absolute z-10 w-full mt-1 bg-indigo-900 border border-purple-800/50 rounded-lg shadow-lg max-h-60 overflow-y-auto hidden"></div>
                    </div>
                     <!-- End Station -->
                    <div class="relative">
                        <div class="flex items-center gap-4 bg-indigo-950/60 p-3 rounded-lg border border-purple-800/50">
                            <div class="bg-pink-500/20 text-pink-400 p-2 rounded-full">
                                <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
                            </div>
                            <div class="w-full">
                                <label for="endStation" class="block text-xs font-medium text-gray-400">DESTINATION</label>
                                 <input type="text" id="endStation" placeholder="Search station or landmark..." class="w-full bg-transparent text-white text-lg font-medium focus:outline-none" autocomplete="off">
                            </div>
                        </div>
                        <div id="endLandmarkNote" class="hidden text-xs text-cyan-400 mt-1 pl-1"></div>
                         <div id="endSuggestions" class="absolute z-10 w-full mt-1 bg-indigo-900 border border-purple-800/50 rounded-lg shadow-lg max-h-60 overflow-y-auto hidden"></div>
                    </div>
                </div>
                 <!-- Find Route Button -->
                <div class="mt-6">
                    <button id="findRouteBtn" class="w-full flex items-center justify-center gap-3 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold py-3.5 px-4 rounded-lg focus:outline-none focus:ring-4 focus:ring-purple-400/50 transform hover:scale-[1.02] transition-all duration-300">
                        <span>Show Route</span>
                         <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" /></svg>
                    </button>
                </div>
            </div>
    
            <!-- Live Line Status -->
            <div class="glass-card rounded-xl p-5 w-full max-w-5xl mb-8">
                <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
                    <h3 class="text-lg font-semibold text-white">Live Line Status</h3>
                    <span id="liveStatusClock" class="text-xs text-gray-400"></span>
                </div>
                <div id="liveLineStatusGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3"></div>
            </div>

            <!-- Map and Route Details Container -->
            <div id="route-display" class="glass-card rounded-xl p-2 sm:p-4 w-full max-w-5xl">
                <div class="flex items-center justify-end gap-3 mb-3 px-1 flex-wrap">
                    <button id="locateMeBtn" class="view-toggle-btn text-sm font-semibold py-2 px-4 rounded-lg flex items-center gap-2">
                        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
                        Find Nearest Station
                    </button>
                </div>
                <div id="nearestStationResult" class="hidden text-sm text-center bg-indigo-950/60 border border-purple-800/50 rounded-lg p-3 mb-3 text-cyan-300"></div>
                <!-- Real-world Leaflet map -->
                <div id="realMapContainer" class="w-full">
                    <div id="realMap"></div>
                </div>
                <!-- Route details text -->
                <div id="routeDetails" class="mt-2 text-center p-2">
                    <p class="text-gray-400 text-lg">Select your journey to see the route plan.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const introScreen = document.getElementById('intro-screen');
            const mainContent = document.getElementById('main-content');

            setTimeout(() => {
                introScreen.classList.add('opacity-0', 'pointer-events-none');
                mainContent.classList.remove('hidden');
                document.dispatchEvent(new Event('metroAppVisible'));
            }, 2700); // slightly longer to let the train animation land
        });

        const metroData = {
            blue: { name: 'Blue Line', color: '#3b82f6', stations: [ { id: 'dakshineswar', name: 'Dakshineshwar' }, { id: 'baranagar', name: 'Baranagar', interchange: ['pink'] }, { id: 'noapara', name: 'Noapara', interchange: ['yellow'] }, { id: 'dumdum', name: 'Dum Dum' }, { id: 'belgachia', name: 'Belgachia', gates: { "1": "Duttabagan Milk Colony", "2": "CTC (WBTC)", "3": "WB University of Animal & Fishery Sciences" } }, { id: 'shyambazar', name: 'Shyambazar', gates: { "1": "Shyambazar 5 point", "2": "RG Kar Medical College Hospital", "3": "MMC college", "4": "Bhupen Bose Avenue" } }, { id: 'shobhabazar', name: 'Shobhabazar Sutanuti', gates: { "1": "Aurobindo Sarani", "2": "Jaipuria College Gate", "3": "BK Paul Avenue Gate" } }, { id: 'girish_park', name: 'Girish Park', gates: { "1 & 2": "Main Gate", "3": "Vivekananda Road" } }, { id: 'mg_road', name: 'MG Road', gates: { "1": "Main Gate", "2": "Netaji Park" } }, { id: 'central', name: 'Central', gates: { "1": "Air India", "2": "Lal Bazar / Indian Coffee House", "3": "RITES Building / Hind Cinema", "4": "Yogayog Bhawan", "5": "Poddar Court", "6": "Medical College / Ganesh Chandra Avenue" } }, { id: 'chandni_chowk', name: 'Chandni Chowk' }, { id: 'esplanade', name: 'Esplanade', interchange: ['green', 'purple'], gates: { "1 & 3": "Rani Rashmoni Gate of Curzon Park", "2": "NewMarket Area / Jawaharlal Nehru Road", "4": "SN Banerjee Road / Newmarket area", "6": "Chowringee Place / NewMarket Area", "7": "Dufferin Road Maidan" } }, { id: 'park_street', name: 'Park Street', interchange: ['purple'], gates: { "1": "Indian Museum", "2": "Towards Lal Bazar", "3": "Main Gate", "6": "Kyd Street" } }, { id: 'maidan', name: 'Maidan', gates: { "1": "Victoria Memorial / Brigade Parade Ground", "2": "Jeevandeep / Middleton St", "3": "Kanak Building / Chowringhee Road" } }, { id: 'rabindra_sadan', name: 'Rabindra Sadan', gates: { "1": "Exide Gate / Shyama Prasad Mukherjee Road" } }, { id: 'netaji_bhawan', name: 'Netaji Bhawan', gates:         // ---- Schedule helper functions (pure, no DOM) ----
        function getDayType(date) {
            const dayName = date.toLocaleString('en-US', { weekday: 'long' });
            return { dayName, isSunday: dayName === 'Sunday', isSaturday: dayName === 'Saturday' };
        }

        function getScheduleForDay(lineKey, date) {
            const line = lineTimetables[lineKey];
            if (!line) return { closed: false, entries: null, dayName: null };
            const { dayName, isSunday, isSaturday } = getDayType(date);
            if (line.closedOn.includes(dayName)) return { closed: true, entries: null, dayName };
            let key = 'weekday';
            if (isSunday) key = line.schedules.sunday ? 'sunday' : 'weekday';
            else if (isSaturday) key = line.schedules.saturday ? 'saturday' : 'weekday';
            return { closed: false, entries: line.schedules[key] || null, dayName };
        }

        function stationIndexInLine(lineKey, stationId) {
            const line = metroData[lineKey];
            if (!line) return -1;
            return line.stations.findIndex(s => s.id === stationId);
        }

        // Picks the timetable entry that best matches the direction of travel
        // between segStartId and segEndId along the given line.
        function pickScheduleEntry(entries, lineKey, segStartId, segEndId) {
            if (!entries || entries.length === 0) return null;
            const exact = entries.find(e => e.from === segStartId && e.to === segEndId);
            if (exact) return exact;
            const startIdx = stationIndexInLine(lineKey, segStartId);
            const endIdx = stationIndexInLine(lineKey, segEndId);
            if (startIdx === -1 || endIdx === -1) return entries[0];
            const forward = startIdx < endIdx;
            const sameDirection = entries.filter(e => {
                const fi = stationIndexInLine(lineKey, e.from);
                const ti = stationIndexInLine(lineKey, e.to);
                if (fi === -1 || ti === -1) return false;
                return forward ? fi < ti : fi > ti;
            });
            return sameDirection.length ? sameDirection[0] : entries[0];
        }

        function computeLineStatus(lineKey, date, segStartId, segEndId) {
            const line = lineTimetables[lineKey];

            if (!line || !meta) return null;
            const { closed, entries, dayName } = getScheduleForDay(lineKey, date);
            if (closed) return { status: 'closed', lineName: line.name, dayName };
            const fromId = segStartId || meta.stations[0].id;
            const toId = segEndId || meta.stations[meta.stations.length - 1].id;
            const entry = pickScheduleEntry(entries, lineKey, fromId, toId);
            if (!entry) return { status: 'unknown', lineName: line.name, dayName };
            const nowStr = date.toTimeString().slice(0, 5);
            if (nowStr < entry.first) {
                return { status: 'before-first', lineName: line.name, dayName, entry, nowStr };
            }
            if (entry.last && nowStr > entry.last) {
                return { status: 'after-last', lineName: line.name, dayName, entry, nowStr };
            }
            return { status: 'available', lineName: line.name, dayName, entry, nowStr };

        document.addEventListener('DOMContentLoaded', () => {
            const startStationInput = document.getElementById('startStation');
            const endStationInput = document.getElementById('endStation');
            const startSuggestions = document.getElementById('startSuggestions');
            const endSuggestions = document.getElementById('endSuggestions');
            const startLandmarkNote = document.getElementById('startLandmarkNote');
            const endLandmarkNote = document.getElementById('endLandmarkNote');
            const findRouteBtn = document.getElementById('findRouteBtn');
            const routeDetailsDiv = document.getElementById('routeDetails');
            const realMapContainer = document.getElementById('realMapContainer');
            const locateMeBtn = document.getElementById('locateMeBtn');
            const nearestStationResult = document.getElementById('nearestStationResult');
            let leafletMap = null;
            let leafletLayers = { lines: [], markers: [], route: null, userMarker: null };
            const stationMap = new Map();
            let currentRoute = [];

            // First, populate the stationMap with ALL stations for routing logic
            // An interchange station is operational if ANY of its instances are operational.
            for (const lineKey in metroData) {
                metroData[lineKey].stations.forEach(station => {
                    const existingStation = stationMap.get(station.id);
                    if (!existingStation || (existingStation.status === 'under-construction' && station.status !== 'under-construction')) {
                        stationMap.set(station.id, station);
                    }
                });
            }

            // Then, create the list for the search bar with ONLY operational stations
            const allStations = Array.from(stationMap.values())
                .filter(station => station.status !== 'under-construction')
                .sort((a, b) => a.name.localeCompare(b.name));

            // ---------- Real-world map (Leaflet + OpenStreetMap) ----------
            const haversineKm = (lat1, lon1, lat2, lon2) => {
                const toRad = deg => deg * Math.PI / 180;
                const R = 6371;
                const dLat = toRad(lat2 - lat1);
                const dLon = toRad(lon2 - lon1);
                const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            };

            function initRealMap() {
                if (leafletMap) return; // already initialized
                if (typeof L === 'undefined') {
                    realMapContainer.innerHTML = '<div class="text-center text-red-400 p-6">Map library failed to load — check your internet connection or that leaflet CDN scripts aren\'t blocked, then refresh.</div>';
                    return;
                }
                leafletMap = L.map('realMap', { scrollWheelZoom: true }).setView([22.56, 88.38], 11);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap contributors',
                    maxZoom: 18
                }).addTo(leafletMap);

                // Draw each line's stations connected in sequence
                for (const lineKey in metroData) {
                    const line = metroData[lineKey];
                    const latlngs = [];
                    line.stations.forEach(station => {
                        const geo = stationGeo[station.id];
                        if (!geo) return;
                        latlngs.push(geo);
                        const isUC = station.status === 'under-construction';
                        const marker = L.circleMarker(geo, {
                            radius: 5,
                            color: '#ffffff',
                            weight: 1.5,
                            fillColor: line.color,
                            fillOpacity: isUC ? 0.4 : 1
                        }).addTo(leafletMap);
                        marker.bindPopup(`<b>${station.name}</b><br>${line.name}${isUC ? ' (under construction)' : ''}`);
                        marker.stationId = station.id;
                        leafletLayers.markers.push(marker);
                    });
                    if (latlngs.length > 1) {
                        const isPartlyUC = line.stations.some(s => s.status === 'under-construction');
                        const polyline = L.polyline(latlngs, {
                            color: line.color,
                            weight: 4,
                            opacity: 0.8,
                            dashArray: isPartlyUC ? '6 6' : null
                        }).addTo(leafletMap);
                        leafletLayers.lines.push(polyline);
                    }
                }
            }

            document.addEventListener('metroAppVisible', () => {
                initRealMap();
                setTimeout(() => leafletMap && leafletMap.invalidateSize(), 150);
            });
            // Fallback in case the event already fired before this listener was attached
            if (!document.getElementById('main-content').classList.contains('hidden')) {
                initRealMap();
                setTimeout(() => leafletMap && leafletMap.invalidateSize(), 150);
            }

            function highlightRouteOnRealMap(route) {
                if (!leafletMap) return;
                if (leafletLayers.route) { leafletMap.removeLayer(leafletLayers.route); leafletLayers.route = null; }
                const latlngs = route.map(id => stationGeo[id]).filter(Boolean);
                if (latlngs.length < 2) return;
                leafletLayers.route = L.polyline(latlngs, { color: '#f472b6', weight: 6, opacity: 0.95 }).addTo(leafletMap);
                leafletMap.fitBounds(leafletLayers.route.getBounds(), { padding: [30, 30] });
            }

            function findNearestStation(userLat, userLng) {
                let nearest = null;
                let minDist = Infinity;
                allStations.forEach(station => {
                    const geo = stationGeo[station.id];
                    if (!geo) return;
                    const d = haversineKm(userLat, userLng, geo[0], geo[1]);
                    if (d < minDist) { minDist = d; nearest = station; }
                });
                return { station: nearest, distanceKm: minDist };
            }

            locateMeBtn.addEventListener('click', () => {
                if (!navigator.geolocation) {
                    nearestStationResult.classList.remove('hidden');
                    nearestStationResult.textContent = 'Geolocation is not supported by your browser.';
                    return;
                }
                nearestStationResult.classList.remove('hidden');
                nearestStationResult.textContent = 'Locating you...';
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const { latitude, longitude } = pos.coords;
                        const { station, distanceKm } = findNearestStation(latitude, longitude);
                        if (!station) {
                            nearestStationResult.textContent = "Couldn't determine a nearest station.";
                            return;
                        }
                        nearestStationResult.innerHTML = `Nearest station: <b class="text-white">${station.name}</b> — approx. ${distanceKm.toFixed(1)} km away.`;

                        if (leafletMap) {
                            if (leafletLayers.userMarker) leafletMap.removeLayer(leafletLayers.userMarker);
                            leafletLayers.userMarker = L.marker([latitude, longitude], {
                                icon: L.divIcon({ className: 'metro-user-marker', iconSize: [14, 14] })
                            }).addTo(leafletMap).bindPopup('You are here').openPopup();

                            const stationGeoLoc = stationGeo[station.id];
                            if (stationGeoLoc) {
                                const bounds = L.latLngBounds([[latitude, longitude], stationGeoLoc]);
                                leafletMap.fitBounds(bounds, { padding: [50, 50] });
                            }
                        }
                    },
                    (err) => {
                        nearestStationResult.textContent = 'Could not get your location. Please allow location access and try again.';
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
            // ---------- End real-world map ----------

            // ---------- Live Line Status panel ----------
            const liveLineStatusGrid = document.getElementById('liveLineStatusGrid');
            const liveStatusClock = document.getElementById('liveStatusClock');
            const lineOrder = ['blue', 'green', 'orange', 'purple', 'yellow'];

            function statusBadge(result) {
                if (!result) return { label: 'Unknown', cls: 'bg-gray-600/30 text-gray-300 border-gray-500/40' };
                switch (result.status) {
                    case 'closed':
                        return { label: `Closed today (${result.dayName})`, cls: 'bg-red-500/10 text-red-300 border-red-500/30' };
                    case 'before-first':
                        return { label: `Not started yet · First train ${to12Hour(result.entry.first)}`, cls: 'bg-yellow-500/10 text-yellow-300 border-yellow-500/30' };
                    case 'after-last':
                        return { label: `Service ended · Last train ${to12Hour(result.entry.last)}${result.entry.lastNote ? ' · ' + result.entry.lastNote : ''}`, cls: 'bg-yellow-500/10 text-yellow-300 border-yellow-500/30' };
                    case 'available':
                        return { label: `Metro Available · Last train ${to12Hour(result.entry.last)}`, cls: 'bg-green-500/10 text-green-300 border-green-500/30' };
                    default:
                        return { label: 'Status unavailable', cls: 'bg-gray-600/30 text-gray-300 border-gray-500/40' };
                }
            }

            function renderLiveLineStatus() {
                const now = new Date();
                liveStatusClock.textContent = `As of your local time — ${now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })} · ${now.toLocaleDateString('en-IN', { weekday: 'long' })}`;
                liveLineStatusGrid.innerHTML = '';
                lineOrder.forEach(lineKey => {
                    const meta = metroData[lineKey];
                    const result = computeLineStatus(lineKey, now);
                    const badge = statusBadge(result);
                    const card = document.createElement('div');
                    card.className = `rounded-lg border p-3 ${badge.cls}`;
                    card.innerHTML = `
                        <div class="flex items-center gap-2 mb-1">
                            <span class="w-2.5 h-2.5 rounded-full inline-block" style="background:${meta.color}"></span>
                            <span class="text-sm font-semibold text-white">${lineTimetables[lineKey].name}</span>
                        </div>
                        <div class="text-xs leading-snug">${badge.label}</div>`;
                    liveLineStatusGrid.appendChild(card);
                });
            }

            renderLiveLineStatus();
            setInterval(renderLiveLineStatus, 30000);
            // ---------- End Live Line Status panel ----------

            const createSuggestions = (input, suggestionsContainer, noteEl) => {
                const query = input.value.toLowerCase();
                suggestionsContainer.innerHTML = '';
                if (noteEl) noteEl.classList.add('hidden');
                if (!query) {
                    suggestionsContainer.classList.add('hidden');
                    return;
                }
                const filteredStations = allStations.filter(station => station.name.toLowerCase().includes(query));
                const filteredLandmarks = landmarks.filter(lm => lm.name.toLowerCase().includes(query));

                if (filteredStations.length > 0 || filteredLandmarks.length > 0) {
                    filteredStations.forEach(station => {
                        const div = document.createElement('div');
                        div.textContent = station.name;
                        div.className = 'p-3 hover:bg-gray-700 cursor-pointer';
                        div.addEventListener('click', () => {
                            input.value = station.name;
                            input.dataset.stationId = station.id;
                            if (noteEl) noteEl.classList.add('hidden');
                            suggestionsContainer.classList.add('hidden');
                        });
                        suggestionsContainer.appendChild(div);
                    });

                    filteredLandmarks.forEach(lm => {
                        const { station, distanceKm } = findNearestStation(lm.lat, lm.lng);
                        const div = document.createElement('div');
                        div.className = 'p-3 hover:bg-indigo-800/60 cursor-pointer border-t border-purple-900/40';
                        div.innerHTML = `<div class="flex items-center gap-2 text-gray-100"><span>📍</span><span>${lm.name}</span></div>` +
                            (station ? `<div class="text-xs text-cyan-400 pl-6 mt-0.5">→ nearest station: ${station.name} (${distanceKm.toFixed(1)} km)</div>` : `<div class="text-xs text-gray-500 pl-6 mt-0.5">No nearby station found</div>`);
                        div.addEventListener('click', () => {
                            if (!station) return;
                            input.value = lm.name;
                            input.dataset.stationId = station.id;
                            if (noteEl) {
                                noteEl.textContent = `📍 Resolved to ${station.name} — approx. ${distanceKm.toFixed(1)} km away`;
                                noteEl.classList.remove('hidden');
                            }
                            suggestionsContainer.classList.add('hidden');
                        });
                        suggestionsContainer.appendChild(div);
                    });

                    suggestionsContainer.classList.remove('hidden');
                } else {
                    suggestionsContainer.classList.add('hidden');
                }
            };

            startStationInput.addEventListener('input', () => createSuggestions(startStationInput, startSuggestions, startLandmarkNote));
            endStationInput.addEventListener('input', () => createSuggestions(endStationInput, endSuggestions, endLandmarkNote));
            
            document.addEventListener('click', (e) => {
                if (!startStationInput.contains(e.target)) startSuggestions.classList.add('hidden');
                if (!endStationInput.contains(e.target)) endSuggestions.classList.add('hidden');
            });


            findRouteBtn.addEventListener('click', () => {
                const startId = startStationInput.dataset.stationId;
                const endId = endStationInput.dataset.stationId;
                
                if (!startId || !endId) {
                    alert('Please select valid start and end stations from the suggestions.');
                    return;
                }
                if (startId === endId) {
                    alert('Start and end stations cannot be the same.');
                    return;
                }
                currentRoute = findShortestRoute(startId, endId);
                
                if (currentRoute) {
                    routeDetailsDiv.style.display = 'block';
                    displayRouteDetails(currentRoute);
                    if (leafletMap) highlightRouteOnRealMap(currentRoute);
                } else {
                    routeDetailsDiv.style.display = 'block';
                    routeDetailsDiv.innerHTML = `<p class="text-red-400 font-semibold">No route found between the selected stations.</p>`;
                }
            });

            function findShortestRoute(startId, endId) {
                let queue = [[startId, [startId]]];
                let visited = new Set([startId]);
                while (queue.length > 0) {
                    let [currentId, path] = queue.shift();
                    if (currentId === endId) return path;
                    getNeighbors(currentId).forEach(neighborId => {
                        if (!visited.has(neighborId)) {
                            visited.add(neighborId);
                            let newPath = [...path, neighborId];
                            queue.push([neighborId, newPath]);
                        }
                    });
                }
                return null;
            }

            function getNeighbors(stationId) {
                const neighbors = new Set();
                // Manual connections
                if (stationId === 'kalighat') neighbors.add('taratala');
                if (stationId === 'taratala') neighbors.add('kalighat');
                if (stationId === 'shahid_khudiram') neighbors.add('satyajit_ray');
                if (stationId === 'satyajit_ray') neighbors.add('shahid_khudiram');
                
                for (const lineKey in metroData) {
                    const line = metroData[lineKey];
                    const stationIndex = line.stations.findIndex(s => s.id === stationId);

                    if (stationIndex !== -1) {
                        // Add previous station if it exists
                        if (stationIndex > 0) {
                            const prevStationId = line.stations[stationIndex - 1].id;
                            neighbors.add(prevStationId);
                        }
                        // Add next station if it exists
                        if (stationIndex < line.stations.length - 1) {
                            const nextStationId = line.stations[stationIndex + 1].id;
                           neighbors.add(nextStationId);
                        }
                        
                        // Handle interchanges
                        const station = line.stations[stationIndex];
                        if (station.interchange) {
                            station.interchange.forEach(interchangeLineKey => {
                                const interchangeLine = metroData[interchangeLineKey];
                                const interchangeStation = interchangeLine.stations.find(s => s.id === stationId);
                                if (interchangeStation) {
                                     const interchangeIndex = interchangeLine.stations.findIndex(s => s.id === stationId);
                                      if (interchangeIndex > 0) neighbors.add(interchangeLine.stations[interchangeIndex - 1].id);
                                    if (interchangeIndex < interchangeLine.stations.length - 1) neighbors.add(interchangeLine.stations[interchangeIndex + 1].id);
                                }
                            });
                        }
                    }
                }
                
                // Return only neighbors that are currently operational
                return Array.from(neighbors).filter(id => stationMap.get(id)?.status !== 'under-construction');
            }

            function getLineForSegment(station1Id, station2Id) {
                for (const lineKey in metroData) {
                    const line = metroData[lineKey];
                    for (let i = 0; i < line.stations.length - 1; i++) {
                        if ((line.stations[i].id === station1Id && line.stations[i+1].id === station2Id) || (line.stations[i].id === station2Id && line.stations[i+1].id === station1Id)) {
                            // Check if the segment is operational
                            if (line.stations[i].status !== 'under-construction' && line.stations[i+1].status !== 'under-construction') {
                                return metroData[lineKey];
                            }
                        }
                    }
                }
                return null;
            }

            function displayRouteDetails(route) {
                routeDetailsDiv.innerHTML = '';
                if (!route || route.length < 2) return;
                const startStation = stationMap.get(route[0]);
                const endStation = stationMap.get(route[route.length - 1]);
                let journeyHtml = `<h3 class="text-xl font-semibold mb-3 text-white">Your Journey Simplified</h3>`;
                let journeyParts = [];

                // --- SERVICE ALERT SECTION (direction + day-type aware, using the user's local device time) ---
                const now = new Date();
                let serviceAlertHtml = '';

                // Break the route into contiguous per-line segments so each
                // segment can be checked against the correct direction's timetable.
                let journeyLineSegments = [];
                let curSeg = { line: getLineForSegment(route[0], route[1]), stations: [route[0]] };
                for (let i = 1; i < route.length; i++) {
                    const segLine = getLineForSegment(route[i - 1], route[i]);
                    if (segLine === curSeg.line) {
                        curSeg.stations.push(route[i]);
                    } else {
                        journeyLineSegments.push(curSeg);
                        curSeg = { line: segLine, stations: [route[i - 1], route[i]] };
                    }
                }
                journeyLineSegments.push(curSeg);

                journeyLineSegments.forEach(seg => {
                    if (!seg.line) return;
                    const lineKey = Object.keys(metroData).find(k => metroData[k] === seg.line);
                    if (!lineKey || !lineTimetables[lineKey]) return;
                    const segStartId = seg.stations[0];
                    const segEndId = seg.stations[seg.stations.length - 1];
                    const result = computeLineStatus(lineKey, now, segStartId, segEndId);
                    if (!result) return;

                    if (result.status === 'closed') {
                        serviceAlertHtml += `<div class="bg-red-500/10 border border-red-500/30 p-3 rounded-lg mb-2 text-red-300"><strong>Service Alert:</strong> The ${result.lineName} does not run on ${result.dayName}s.</div>`;
                    } else if (result.status === 'before-first') {
                        serviceAlertHtml += `<div class="bg-yellow-500/10 border border-yellow-500/30 p-3 rounded-lg mb-2 text-yellow-300"><strong>Timing Alert:</strong> The ${result.lineName} hasn't started for the day yet on this stretch — first train departs at ${to12Hour(result.entry.first)}.</div>`;
                    } else if (result.status === 'after-last') {
                        serviceAlertHtml += `<div class="bg-yellow-500/10 border border-yellow-500/30 p-3 rounded-lg mb-2 text-yellow-300"><strong>Timing Alert:</strong> Service on the ${result.lineName} for this stretch has ended — last train was at ${to12Hour(result.entry.last)}${result.entry.lastNote ? ' (' + result.entry.lastNote + ')' : ''}.</div>`;
                    } else if (result.status === 'available') {
                        serviceAlertHtml += `<div class="bg-green-500/10 border border-green-500/30 p-3 rounded-lg mb-2 text-green-300"><strong>Metro Available:</strong> ${result.lineName} is running now (last train ${to12Hour(result.entry.last)}${result.entry.lastNote ? ', ' + result.entry.lastNote : ''}).</div>`;
                    }
                });
                journeyHtml += serviceAlertHtml;
                // --- END OF SERVICE ALERT SECTION ---


                let involvesMaintenance = route.some((id, i) => i < route.length -1 && ((id === 'shahid_khudiram' && route[i+1] === 'satyajit_ray') || (id === 'satyajit_ray' && route[i+1] === 'shahid_khudiram')));
                if (involvesMaintenance) {
                    journeyHtml += `<div class="bg-yellow-500/10 border border-yellow-500/30 p-3 rounded-lg mb-4 text-left md:text-center">
                        <p class="text-yellow-300"><strong class="font-bold">Maintenance Alert:</strong> Interchange at Kavi Subhash is closed. An alternative route is suggested.</p>
                    </div>`;
                }
                const firstSegmentLine = getLineForSegment(route[0], route[1]);
                if (firstSegmentLine) {
                     const part = `Board the <strong style="color:${firstSegmentLine.color};">${firstSegmentLine.name}</strong> from <strong>${startStation.name}</strong>.`;
                     journeyParts.push(part);
                }
                for (let i = 1; i < route.length - 1; i++) {
                    const prevStationId = route[i-1], currentStationId = route[i], nextStationId = route[i+1];
                    if ((currentStationId === 'kalighat' && nextStationId === 'taratala') || (currentStationId === 'taratala' && nextStationId === 'kalighat')) {
                        const nextMetroLine = getLineForSegment(nextStationId, route[i + 2]);
                        let part1 = `Travel to <strong>${stationMap.get(currentStationId).name}</strong>.`;
                        journeyParts.push(part1);
                        
                        let part2 = `<span class="text-yellow-400 font-semibold">Take an auto ride to ${stationMap.get(nextStationId).name}</span> to board the <strong style="color:${nextMetroLine.color};">${nextMetroLine.name}</strong>.`;
                        journeyParts.push(part2);
                        i++;
                        continue;
                    }
                    if ((currentStationId === 'shahid_khudiram' && nextStationId === 'satyajit_ray') || (currentStationId === 'satyajit_ray' && nextStationId === 'shahid_khudiram')) {
                        const nextMetroLine = getLineForSegment(nextStationId, route[i + 2]);
                        let nextLineInfo = nextMetroLine ? ` to board the <strong style="color:${nextMetroLine.color};">${nextMetroLine.name}</strong>` : '';
                        
                        let part1 = `Travel to <strong>${stationMap.get(currentStationId).name}</strong>.`;
                        journeyParts.push(part1);

                        let part2 = `<span class="text-yellow-400 font-semibold">Exit and take a bus to ${stationMap.get(nextStationId).name}</span>${nextLineInfo}.`;
                        journeyParts.push(part2);
                        i++;
                        continue;
                    }
                    const prevSegmentLine = getLineForSegment(prevStationId, currentStationId);
                    const nextSegmentLine = getLineForSegment(currentStationId, nextStationId);
                    if (prevSegmentLine && nextSegmentLine && prevSegmentLine.name !== nextSegmentLine.name) {
                        const part = `At <strong>${stationMap.get(currentStationId).name}</strong>, change to the <strong style="color:${nextSegmentLine.color};">${nextSegmentLine.name}</strong>.`;
                        journeyParts.push(part);
                    }
                }
                const lastPart = `Continue to your destination, <strong>${endStation.name}</strong>.`;
                journeyParts.push(lastPart);
                
                // Add Journey Details
                journeyHtml += `<div class="bg-gray-900/70 p-4 rounded-lg mt-2"><p class="text-gray-300 text-left md:text-center leading-relaxed text-base md:text-lg">${journeyParts.join(' ')}</p></div>`;
                
                // --- FARE CALCULATION & DURATION SECTION ---
                let fareInfoHtml = '';
                let totalFare = 0;
                let fareCalculated = true;
                
                if (route.length > 1) {
                    let journeySegments = [];
                    let currentSegment = {
                        line: getLineForSegment(route[0], route[1]),
                        stations: [route[0]]
                    };

                    for (let i = 1; i < route.length; i++) {
                        const segmentLine = getLineForSegment(route[i-1], route[i]);
                        if (segmentLine === currentSegment.line) {
                            currentSegment.stations.push(route[i]);
                        } else {
                            journeySegments.push(currentSegment);
                            currentSegment = {
                                line: segmentLine,
                                stations: [route[i-1], route[i]]
                            };
                        }
                    }
                    journeySegments.push(currentSegment);

                    if (journeySegments.length > 0) {
                        journeySegments.forEach(segment => {
                            if (segment.line) {
                                const segmentStartId = segment.stations[0];
                                const segmentEndId = segment.stations[segment.stations.length - 1];
                                
                                const lineName = segment.line.name.toLowerCase().replace(' line', '');
                                const fareMatrix = lineFareMatrices[lineName];
                                const startCode = stationIdToCode[segmentStartId];
                                const endCode = stationIdToCode[segmentEndId];

                                if (fareMatrix && fareMatrix[startCode] && fareMatrix[startCode][endCode] !== undefined) {
                                    totalFare += fareMatrix[startCode][endCode];
                                } else if (fareMatrix && fareMatrix[endCode] && fareMatrix[endCode][startCode] !== undefined) {
                                    totalFare += fareMatrix[endCode][startCode];
                                } else {
                                    fareCalculated = false;
                                }
                            }
                        });
                    } else {
                        fareCalculated = false;
                    }
                } else {
                    fareCalculated = false;
                }

                if (fareCalculated && totalFare >= 0) {
                     fareInfoHtml = `
                        <div class="mt-4 text-center bg-indigo-950/60 p-4 rounded-lg border border-purple-800/50">
                            <h4 class="text-lg font-semibold mb-1 text-purple-300">Estimated Fare</h4>
                            <p class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400">₹ ${totalFare.toFixed(2)}</p>
                            <div class="mt-4 pt-4 border-t border-purple-800/40 flex flex-col items-center gap-2">
                                <div class="flex items-center gap-2 text-sm text-gray-300">
                                    <svg class="w-5 h-5 text-cyan-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h.01M15 12h.01M3 9a2 2 0 012-2h14a2 2 0 012 2v1.5a1.5 1.5 0 000 3V15a2 2 0 01-2 2H5a2 2 0 01-2-2v-1.5a1.5 1.5 0 000-3V9z" /></svg>
                                    <span>Book your ticket in the official app</span>
                                </div>
                                <div class="flex items-center gap-3 flex-wrap justify-center">
                                    <a href="https://play.google.com/store/apps/details?id=org.cris.kmmts&hl=en_IN" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 bg-indigo-900/70 hover:bg-indigo-800/80 border border-purple-700/50 text-gray-200 text-sm font-medium py-2 px-3 rounded-lg transition-colors">
                                        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3.6v16.8c0 .5.3.9.7 1.1l9.7-9.5L3.7 2.5c-.4.2-.7.6-.7 1.1zM17.6 9.6L14.9 8 5.2 2.5l8.8 8.6 3.6-1.5zM5.2 21.5L14.9 16l2.7-1.6-3.6-3.5-8.8 8.6zM19.6 10.4L18 11.3v1.4l1.6.9c.9-.5 1.4-1.1 1.4-1.8s-.5-1.3-1.4-1.4z"/></svg>
                                        Google Play
                                    </a>
                                    <a href="https://apps.apple.com/in/app/aamar-kolkata-metro/id6469577611" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 bg-indigo-900/70 hover:bg-indigo-800/80 border border-purple-700/50 text-gray-200 text-sm font-medium py-2 px-3 rounded-lg transition-colors">
                                        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8.94-.19 1.83-.87 3.14-.79 1.57.13 2.75.74 3.52 1.85-3.13 1.87-2.54 5.98.47 7.2-.55 1.42-1.27 2.83-2.21 3.91zM12.03 7.25c-.15-2.23 1.66-4.09 3.74-4.25.29 2.32-2.09 4.13-3.74 4.25z"/></svg>
                                        App Store
                                    </a>
                                </div>
                            </div>
                        </div>`;
                }
                journeyHtml += fareInfoHtml;
                // --- END OF FARE & DURATION SECTION ---


                // --- GATE INFORMATION SECTION ---
                let gateInfoHtml = '';
                if (startStation.gates || endStation.gates) {
                    gateInfoHtml += `<div class="mt-4 text-left bg-indigo-950/60 p-4 rounded-lg border border-purple-800/50">`;
                    gateInfoHtml += `<h4 class="text-lg font-semibold mb-2 text-purple-300">Gate Information</h4>`;

                    if (startStation.gates) {
                        gateInfoHtml += `<div class="mb-2"><strong class="text-purple-400">${startStation.name} (Start):</strong><ul class="list-disc list-inside text-gray-400 text-sm pl-2">`;
                        for (const gateNum in startStation.gates) {
                            gateInfoHtml += `<li>Gate ${gateNum}: ${startStation.gates[gateNum]}</li>`;
                        }
                        gateInfoHtml += `</ul></div>`;
                    }

                    if (endStation.gates) {
                        gateInfoHtml += `<div><strong class="text-pink-400">${endStation.name} (Destination):</strong><ul class="list-disc list-inside text-gray-400 text-sm pl-2">`;
                        for (const gateNum in endStation.gates) {
                            gateInfoHtml += `<li>Gate ${gateNum}: ${endStation.gates[gateNum]}</li>`;
                        }
                        gateInfoHtml += `</ul></div>`;
                    }

                    gateInfoHtml += `</div>`;
                }
                
                journeyHtml += gateInfoHtml;
                // --- END OF NEW GATE INFORMATION SECTION ---

                routeDetailsDiv.innerHTML = journeyHtml;
                
            }
        });
    </script>
</body>
</html>
